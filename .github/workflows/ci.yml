name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: boilerworks_test
          POSTGRES_USER: boilerworks
          POSTGRES_PASSWORD: boilerworks
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U boilerworks"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://boilerworks:boilerworks@localhost:5432/boilerworks_test?sslmode=disable

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Install templ
        run: go install github.com/a-h/templ/cmd/templ@v0.3.1001

      - name: Generate templ files
        run: templ generate

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Run migrations
        run: |
          psql "$DATABASE_URL" < docker/init.sql

      - name: Test
        run: go test -v -race -count=1 ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Install templ
        run: go install github.com/a-h/templ/cmd/templ@v0.3.1001

      - name: Generate templ files
        run: templ generate

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
